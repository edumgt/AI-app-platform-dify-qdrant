services:
  postgres:
    image: postgres:16
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ai_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_platform_pw}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: ai-platform-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  qdrant-service:
    build:
      context: ./services/qdrant_service
    container_name: ai-platform-qdrant-service
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8088:8088"
    depends_on:
      - qdrant

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ai-platform-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ai_platform:ai_platform_pw@postgres:5432/ai_platform}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      RETRIEVER_BASE_URL: ${RETRIEVER_BASE_URL:-http://qdrant-service:8088}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - qdrant-service

  web:
    build:
      context: ./apps/web
    container_name: ai-platform-web
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  qdrant_storage:
